name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Extras cover the deps imported by the test suite (chat→llm, crawl, email).
          # Add a service's extra here when you add tests that import it.
          pip install -e ".[llm,crawl,email,dev]" ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -m "not live"
